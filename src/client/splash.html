<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0, width=device-width, height=device-height, user-scalable=0"
    />
    <title>Glyphborne</title>
    <link rel="stylesheet" href="splash.css" />
  </head>
  <body class="app">
    <!-- Flat Background Cartoon Circles -->
    <div class="bubble bub-1"></div>
    <div class="bubble bub-2"></div>
    <div class="bubble bub-3"></div>
    <div class="bubble bub-4"></div>

    <div class="main-content">
      <!-- Cartoonish Anglerfish SVG -->
      <div class="fish-container">
        <svg class="splash-fish" viewBox="0 0 200 200" width="150" height="150" xmlns="http://www.w3.org/2000/svg">
          <!-- Lure Antenna -->
          <path d="M 100 65 Q 125 15 155 65" fill="none" stroke="#000000" stroke-width="6" stroke-linecap="round" />
          <path d="M 100 65 Q 125 15 155 65" fill="none" stroke="#00e5ff" stroke-width="3" stroke-linecap="round" />
          
          <!-- Lure (Flat color, black border) -->
          <circle cx="155" cy="65" r="14" fill="#00e5ff" stroke="#000000" stroke-width="3" />
          <circle cx="155" cy="65" r="6" fill="#ffffff" />

          <!-- Tail Fin -->
          <path d="M 52 105 L 18 70 L 32 105 L 18 140 Z" fill="#002b49" stroke="#000000" stroke-width="4.5" stroke-linejoin="round" />
          <path d="M 52 105 L 18 70 L 32 105 L 18 140 Z" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linejoin="round" />

          <!-- Dorsal Fin -->
          <path d="M 75 62 L 48 30 L 52 68 Z" fill="#002b49" stroke="#000000" stroke-width="4.5" stroke-linejoin="round" />
          <path d="M 75 62 L 48 30 L 52 68 Z" fill="none" stroke="#00e5ff" stroke-width="1.5" stroke-linejoin="round" />

          <!-- Main Body -->
          <circle cx="95" cy="105" r="45" fill="#001122" stroke="#000000" stroke-width="5" />
          <circle cx="95" cy="105" r="45" fill="none" stroke="#00e5ff" stroke-width="2" />

          <!-- Goofy Cartoon Eyes (Overlapping, looking forward/right) -->
          <!-- Left Eye -->
          <circle cx="112" cy="90" r="10" fill="#ffffff" stroke="#000000" stroke-width="2" />
          <circle cx="114" cy="90" r="4.5" fill="#000000" />
          
          <!-- Right Eye -->
          <circle cx="127" cy="97" r="8" fill="#ffffff" stroke="#000000" stroke-width="2" />
          <circle cx="128" cy="97" r="3.5" fill="#000000" />
        </svg>
      </div>

      <div class="logo-box">
        <h1 class="logo-text">GLYPHBORNE</h1>
        <p class="subtitle">Abyssal Depths</p>
      </div>

      <div class="info-card">
        <p class="description">
          Combine geometric essence to cast abyssal spells, defeat entities, and climb the daily leaderboard challenge!
        </p>
        <div class="daily-box" id="daily-box">
          <span class="daily-badge">DAILY BONUS GLYPH</span>
          <span class="daily-glyph" id="daily-glyph">Loading daily bonus...</span>
        </div>
      </div>

      <button class="start-button" id="start-button">
        ENTER THE DEPTHS
      </button>
    </div>

    <footer class="footer">
      <div class="docs-link" id="docs-link">Docs</div>
      <span class="divider">|</span>
      <div class="docs-link" id="playtest-link">r/Devvit</div>
      <span class="divider">|</span>
      <div class="docs-link" id="discord-link">Discord</div>
    </footer>
    <script type="module" src="splash.ts" defer></script>
  </body>
</html>
